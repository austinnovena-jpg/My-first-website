<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radial Gradient</title>
    <style>
        #rad1{
            height: 150px;
            width: 200px;
            background-color: cyan;
            background-image: radial-gradient(red,yellow,green);
        }
        #rad2{
            height: 150px;
            width: 200px;
            background-image: repeating-radial-gradient(circle,white ,pink 10%,white 15%);
        }
    </style>
</head>
<body>
    <h1>Radial Gragient - evenly spaced colour</h1>
    <div id="rad1"></div>
    <div id="rad2"></div>
</body>
</html>
