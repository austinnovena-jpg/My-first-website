<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
  <h2>Checkboxes</h2>
  <p>The  <strong> input type="checkbox"</strong> defines a checkbox:</p>
  
  <form action="action_page.html">
  <input type="checkbox" id="vehicle" name="vehicle1" value="Bike">
  <label for="vehicle1"> I have a bike </label><br>  
  <input type="checkbox" id="vehicle 2" name="vehicle2" value="car">
  <label for="vehicle2"> I have a car </label><br>
  <input type="checkbox" id="vehicle 3" name="vehicle3" value="boat">
  <label for="vehicle3"> I have a boat </label><br><br>

  <label for="cars">Choose a car:</label>
  <select id="cars" name="cars">
    <option value="volvo">Volvo</option>
    <option value="saab">Saab</option>
    <option value="fiat">Fiat</option>
    <option value="audi">Audi</option>
  </select>
  <textarea name="message" rows="8" cols="15">
    Any car you choose will be shown to u in different colours and sizes
  </textarea>
  
  <input type="Submit" value="Submit"
</form>
</body>
</html>
