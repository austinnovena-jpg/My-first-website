<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    img{
        position: absolute;
        left: 0px;
        top: 0px;
        z-index: 0;
    }
    h1{z-index: -1;}
    p{z-index: 1;}
</style>
<body>
    <h1 style="color: blueviolet;">This is a heading</h1>
    <img src="skyler-smith-2K9pX8l8C2k-unsplash.jpg">
    <p style="color: blueviolet;">Because the image has a z-index of -1, it will be placed behind</p>
</body>
</html>
